<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entertainment Search App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🍿 EntertainmentFinder</h1>
        
        <div class="tabs">

        <form id="form">
            <input type="text" id="search" class="search" placeholder="Search for a TV show...">
        </form>
    </header>

    <main id="main">
        </main>

    <script src="script.js"></script>
</body>
</html>
